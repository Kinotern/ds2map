<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>死亡搁浅2互动地图</title>
  <link rel="stylesheet" href="./vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="./assets/app.css?v=20260415-search-map">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-head">
        <h1>死亡搁浅2互动地图</h1>
      </header>

      <section class="map-switch" id="mapSwitch"></section>

      <section class="top-actions">
        <button type="button" id="showAllBtn">显示全部</button>
        <button type="button" id="hideAllBtn">隐藏全部</button>
        <button type="button" id="toggleLabelBtn" class="active">显示标点名称</button>
        <button type="button" id="exportSelectedBtn">导出当前地图</button>
      </section>

      <section class="category-wrap" id="categoryWrap"></section>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="map-search" id="mapSearch">
        <div class="map-search__panel" id="searchResult"></div>
        <div class="map-search__bar">
          <input id="searchInput" type="search" placeholder="搜索点位">
          <button type="button" class="map-search__clear" id="searchClearBtn" aria-label="清空搜索">×</button>
        </div>
      </div>
      <div class="theme-dock" id="themeDock">
        <theme-button id="themeToggle" value="light" size="2"></theme-button>
      </div>
      <button id="mobileToggle" class="mobile-toggle" type="button">&#31579;&#36873;</button>
    </main>
  </div>

  <script src="./vendor/leaflet/leaflet.js"></script>
  <script src="./mapdata/profiles.js"></script>
  <script>
    (() => {
      const key = "ds2map_theme_mode_v4";
      let theme = "light";
      try {
        const saved = localStorage.getItem(key);
        if (saved === "dark" || saved === "light") {
          theme = saved;
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = "dark";
        }
      } catch {}
      const button = document.getElementById("themeToggle");
      if (button) {
        button.setAttribute("value", theme);
      }
    })();
  </script>
  <script src="./assets/theme-button-4.js?v=20260415-search-map"></script>
  <script src="./assets/app.js?v=20260415-search-map"></script>
</body>
</html>
